version: '3.8'

services:
  app:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "3000:3000"
      - "3443:3443"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HTTPS_PORT=3443
      # Production environment variables (set via .env file or docker run -e)
      # - ZOOM_VSDK_KEY=${ZOOM_VSDK_KEY}
      # - ZOOM_VSDK_SECRET=${ZOOM_VSDK_SECRET}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_REGION=${AWS_REGION}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    # Production logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"